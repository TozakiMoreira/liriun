<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jarvis — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #08090a;
    --bg-elev: #101113;
    --border: #1f2023;
    --border-strong: #2a2b2f;
    --text: #f7f8f8;
    --text-dim: #8a8f98;
    --text-subtle: #62666d;
    --accent: #5e6ad2;
    --accent-hover: #7179d8;
    --danger: #eb5757;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 48px 24px;
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(94, 106, 210, 0.15), transparent),
      var(--bg);
  }

  .card {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .logo {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, #5e6ad2, #8b5cf6);
    display: grid;
    place-items: center;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    box-shadow: 0 4px 16px rgba(94, 106, 210, 0.3);
  }

  .brand-name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.4px;
  }

  .greeting {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
    margin-top: -12px;
  }

  .form {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.1px;
  }

  .field input {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.15s, background 0.15s;
  }

  .field input:hover {
    border-color: var(--border-strong);
  }

  .field input:focus {
    outline: none;
    border-color: var(--accent);
    background: #13141a;
  }

  .field input::placeholder {
    color: var(--text-subtle);
  }

  .btn {
    padding: 10px 16px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    margin-top: 4px;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
  }

  .btn-primary:active {
    transform: translateY(1px);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-subtle);
    font-size: 12px;
    margin: 4px 0;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .signup {
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
  }

  .signup a {
    color: var(--text);
    font-weight: 500;
    text-decoration: none;
    border-bottom: 1px solid var(--border-strong);
    padding-bottom: 1px;
    transition: border-color 0.15s;
  }

  .signup a:hover {
    border-color: var(--accent);
  }

  .footnote {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text-subtle);
    font-size: 11px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <main class="page">
    <div class="card">
      <div class="brand">
        <div class="logo" aria-hidden="true">J</div>
        <div class="brand-name">Jarvis</div>
      </div>

      <p class="greeting" data-testid="jarvis-greeting">
        Bem-vindo de volta. Entra com suas credenciais que eu cuido do resto.
      </p>

      <form class="form" data-testid="login-form" onsubmit="event.preventDefault();">
        <div class="field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="voce@exemplo.com"
            autocomplete="email"
            data-testid="login-email-input"
            required>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            data-testid="login-password-input"
            required>
        </div>

        <button type="submit" class="btn btn-primary" data-testid="login-submit-btn">
          Entrar
        </button>
      </form>

      <div class="divider">ou</div>

      <p class="signup">
        Primeira vez por aqui?
        <a href="#" data-testid="login-signup-link">Criar conta</a>
      </p>
    </div>
  </main>

  <div class="footnote">JARVIS • v0.1 BETA</div>
</body>
</html>
